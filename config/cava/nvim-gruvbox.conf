[general]
framerate = 60
autosens = 1
sensitivity = 120
bars = 20
bar_width = 2
bar_spacing = 1
center_align = 1
max_height = 86
lower_cutoff_freq = 40
higher_cutoff_freq = 14000
sleep_timer = 0

[input]
method = pipewire
source = auto
sample_rate = 44100
sample_bits = 16
channels = 2

[output]
method = noncurses
orientation = bottom
channels = mono
mono_option = average
reverse = 0
xaxis = none
synchronized_sync = 1
show_idle_bar_heads = 1
waveform = 0

[color]
background = default
gradient = 1
gradient_color_1 = '#7c6f64'
gradient_color_2 = '#a89984'
gradient_color_3 = '#d5c4a1'
gradient_color_4 = '#ebdbb2'
gradient_color_5 = '#fabd2f'
gradient_color_6 = '#fe8019'
gradient_color_7 = '#fb4934'
gradient_color_8 = '#cc241d'
